// Normalize text for cache lookups
function normalizeForCache(text) {
  const fillerWords = [
    'a', 'an', 'the', 'at', 'in', 'on', 'to', 'for', 'of', 'with',
    'ate', 'had', 'went', 'got', 'saw', 'was', 'did', 'some',
    'really', 'very', 'quite', 'pretty', 'just', 'and', 'or'
  ];
  return text
    .toLowerCase()
    .replace(/[^\w\s]/g, '')
    .split(/\s+/)
    .filter(word => word.length > 2 && !fillerWords.includes(word))
    .join(' ')
    .trim();
}

async function classifyWithOpenAI(text, categories) {

      method: 'POST',

    if (!response.ok) {
      const errorBody = await response.text();
      console.error('❌ Worker error:', response.status, errorBody);
      return null;
    }

    const data = await response.json();
    console.log('✅ Worker response:', data);
    return data.category;

  } catch (error) {
    console.error('❌ Worker fetch failed:', error);

// === Google Maps helpers ===
function waitForGoogleMaps() {
  return new Promise(resolve => {
    if (window.google && window.google.maps) return resolve();
    const interval = setInterval(() => {
      if (window.google && window.google.maps) {
        clearInterval(interval);
        resolve();
      }
    }, 100);
  });
}

function distanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function isPlaceCategory(cat) {
  return ['Food', 'Coffee', 'Pints', 'Places'].includes(cat);

// Words that are NOT venue names: generic preference/filler words plus every
// food/drink/place keyword. A real venue reference ("Dublin Pizza Company",
// "Grogans") contains tokens outside this set; a generic preference
// ("I like pizza", "sushi") does not — so we can refuse to geotag the latter.
const GEO_GENERIC_WORDS = new Set(
  ['like','love','loved','hate','hated','really','great','greatest','best','nice','good','bad',
   'amazing','lovely','tasty','delicious','favourite','favorite','this','that','had','have',
   'went','got','tried','tasted','grabbed','ordered','some','today','yesterday','tonight',
   'morning','evening','lunch','dinner','breakfast','brunch','place','spot','here','there']
   .concat(['Food','Coffee','Pints','Wine','Cheese','Places']
     .flatMap(c => FULL_CATEGORIES[c] || []))
);

// Singularize a word WITHOUT mangling words that genuinely end in "ss"
// ("guinness" -> "guinness", but "pints" -> "pint", "burgers" -> "burger").
function singularize(w) {
  if (w.endsWith('ss')) return w;          // guinness, glass, address
  if (w.endsWith('ies') && w.length > 4) return w.slice(0, -3) + 'y'; // berries -> berry
  if (w.endsWith('s') && !w.endsWith('us')) return w.slice(0, -1);    // pints -> pint
  return w;
}

// === KEYWORD FALLBACK (MOVED TO MODULE SCOPE — was previously trapped inside tryGeotag, causing crashes) ===
function keywordFallback(text) {
  const lower = text.toLowerCase();
  // Check BOTH the original word and a singularized form so "Guinness",
  // "chips", "IPAs" etc. still match instead of being mangled.
  const inputWords = lower.split(/\s+/)
    .map(w => w.replace(/[^\w]/g, ''))
    .filter(w => w.length > 2)
    .flatMap(w => [w, singularize(w)]);
  const scores = {};

  ALL_CATEGORIES.forEach(c => scores[c] = 0);

  for (const word of inputWords) {
    for (const [cat, keywords] of Object.entries(FULL_CATEGORIES)) {
      if (keywords?.includes(word)) {
        scores[cat] += 1;
      }
    }
  }

  let best = 'Other';
  let maxScore = 0;
  for (const [cat, score] of Object.entries(scores)) {
    if (score > maxScore) {
      maxScore = score;
      best = cat;
    }
  }

  console.log('🔤 Keyword fallback:', best, `(score: ${maxScore})`);
  return maxScore > 0 ? best : 'Other';
}

// === Strict geotagging with name + type + distance match ===
async function tryGeotag(text, userLat, userLng, expectedCategory) {
  if (!window.google?.maps) return null;

  try {
    await waitForGoogleMaps();
    const service = new google.maps.places.PlacesService(document.createElement('div'));

    const request = {
      query: text,
      location: new google.maps.LatLng(userLat, userLng),
      radius: 500,
    };

    const results = await new Promise(resolve => {
      service.textSearch(request, (res, status) => {
        resolve(status === google.maps.places.PlacesServiceStatus.OK ? res || [] : []);
      });
    });

    if (results.length === 0) return null;

    // Distinctive = words that could be part of a venue NAME (not generic
    // food/drink/preference words). "I like pizza" has none -> never geotag.
    const inputWords = text.toLowerCase().replace(/[^\w\s]/g, ' ').split(/\s+/).filter(w => w.length > 2);
    const distinctive = inputWords.filter(w => !GEO_GENERIC_WORDS.has(w) && !GEO_GENERIC_WORDS.has(singularize(w)));
    if (distinctive.length === 0) {
      console.log('📍 Skipped geotag: no venue name in', JSON.stringify(text));
      return null;
    }

    const typeMap = {
      Food: ['restaurant', 'food', 'meal_takeaway', 'bakery', 'cafe'],
      Coffee: ['cafe', 'coffee_shop'],
      Pints: ['bar', 'pub', 'night_club', 'brewery'],
      Places: ['tourist_attraction', 'park', 'museum', 'landmark']
    };
    const expectedTypes = typeMap[expectedCategory] || [];

    // Find the CLOSEST result whose name actually contains a distinctive word
    // and whose type matches the category — not just the nearest result of any
    // name (which broke "vice pizza" when a closer pizzeria existed).
    let best = null, bestDist = Infinity;
    for (const r of results) {
      const loc = r.geometry?.location;
      if (!loc) continue;
      const d = distanceKm(userLat, userLng, loc.lat(), loc.lng());
      if (d > 3) continue;
      const name = (r.name || '').toLowerCase().replace(/[^\w\s]/g, '');
      if (!distinctive.some(w => name.includes(w))) continue;
      const typeOk = expectedTypes.length === 0 || r.types?.some(t => expectedTypes.includes(t));
      if (!typeOk) continue;
      if (d < bestDist) { best = r; bestDist = d; }
    }
    if (!best) return null;

    console.log(`📍 Geotag success: "${best.name}" (${bestDist.toFixed(2)}km)`);
    return {
      category: expectedCategory,
      lat: best.geometry.location.lat(),
      lng: best.geometry.location.lng()
    };
  } catch (e) {
    console.warn('Geotag failed:', e);
    return null;
  }
}

// === Master detect-category function ===
// Returns either a string (category name, possibly "NEW:Something") OR an object {category, lat, lng}
async function detectCategory(inputText, userLat, userLng, effectiveCategories) {
  const text = inputText.trim();
  if (!text) return 'Other';

  const normalized = normalizeForCache(text);

  // 1. CHECK CACHE FIRST
  if (categoryCache[normalized]) {
    const cached = categoryCache[normalized];
    // Older cache entries may be objects {category,lat,lng}. We now trust ONLY
    // the category and always resolve location fresh from the current position,
    // so the same phrase logged in a different place isn't given a stale pin.
    const cachedCat = (typeof cached === 'object' && cached !== null) ? cached.category : cached;
    console.log('💾 Cache hit:', normalized, '→', cachedCat);
    if (isPlaceCategory(cachedCat) && userLat && userLng) {
      const geo = await tryGeotag(text, userLat, userLng, cachedCat);
      return geo ? geo : cachedCat;
    }
    return cachedCat;
  }

  // 2. OPENAI CLASSIFICATION
  console.log('🤖 Calling OpenAI for:', text);
  const aiCategory = await classifyWithOpenAI(text, effectiveCategories);

  let resultCategory;
  if (aiCategory) {
    resultCategory = aiCategory;
  } else {
    resultCategory = keywordFallback(text);
  }

  // 3. If AI suggested a new category (NEW:Name), don't cache yet — caller decides
  if (typeof resultCategory === 'string' && resultCategory.startsWith('NEW:')) {
    return resultCategory;
  }

  // 4. GEOTAG ONLY IF PLACE-RELATED + LOCATION AVAILABLE
  let finalResult = resultCategory;
  if (isPlaceCategory(resultCategory) && userLat && userLng) {
    const geo = await tryGeotag(text, userLat, userLng, resultCategory);
    if (geo) finalResult = geo;
  }

  // 5. CACHE ONLY THE CATEGORY — never coordinates. Location is resolved fresh
  //    on every entry so a cached phrase can't carry an old place's pin.
  categoryCache[normalized] = (typeof finalResult === 'object' && finalResult !== null)
    ? finalResult.category
    : finalResult;
  saveCache();

  return finalResult;
}

// === Voice transcript parser ===
// "I love Dublin Pizza Company" -> { rating: 'like',    text: 'Dublin Pizza Company' }
// "I don't like the new Tesco"  -> { rating: 'dislike', text: 'the new Tesco' }
function parseVoice(transcript) {
  const raw = transcript.trim().replace(/[.!?]+$/, '');
  // Order matters: test dislike first ("don't like" contains "like").
  const DISLIKE = /^\s*(i\s+)?(really\s+|absolutely\s+|so\s+)?(do not like|don'?t like|did not like|didn'?t like|dislike[d]?|hate[d]?|am not a fan of|'?m not a fan of|can'?t stand|didn'?t enjoy|do not enjoy|don'?t enjoy|wasn'?t keen on|am not keen on)\s+/i;
  const LIKE = /^\s*(i\s+)?(really\s+|absolutely\s+|so\s+)?(like[d]?|love[d]?|enjoy[ed]*|am a fan of|'?m a fan of|rate|recommend|am into)\s+/i;

  let m = raw.match(DISLIKE);
  if (m) return { rating: 'dislike', text: raw.slice(m[0].length).trim() };
  m = raw.match(LIKE);
  if (m) return { rating: 'like', text: raw.slice(m[0].length).trim() };
  // No explicit sentiment — default to like, keep the whole phrase.
  return { rating: 'like', text: raw };
}

// === Filter helper used everywhere for the text-search feature ===
function matchesTextFilter(item, query) {
  if (!query || query.trim().length < 2) return true;
  const q = query.toLowerCase();
  const text = (item.text || '').toLowerCase();
  const comment = (item.comment || '').toLowerCase();
  return text.includes(q) || comment.includes(q);
}

// === UserProfile Component ===
function UserProfile({ targetUid, onBack, currentUser, userLat, userLng, effectiveCategories }) {
  const [profileUser, setProfileUser] = useState(null);
  const [profileItems, setProfileItems] = useState([]);
  const [comments, setComments] = useState({});
  const [selectedCategory, setSelectedCategory] = useState('All');
  const [textFilter, setTextFilter] = useState('');
  const [loading, setLoading] = useState(true);

  const loadComments = async (itemList) => {
    const itemIds = itemList.map(i => i.id);
    if (!itemIds.length) return;
    for (let i = 0; i < itemIds.length; i += 30) {
      const batch = itemIds.slice(i, i + 30);
      const snap = await db.collection(COMMENTS_COLLECTION)
        .where('itemId', 'in', batch)
        .orderBy('createdAt', 'asc')
        .get();
      const map = {};
      snap.docs.forEach(d => {
        const c = { id: d.id, ...d.data() };
        const arr = map[c.itemId] || [];
        arr.push(c);
        map[c.itemId] = arr;
      });
      setComments(prev => ({ ...prev, ...map }));
    }
  };

  useEffect(() => {
    let unsubItems;
    (async () => {
      const userDoc = await db.collection('users').doc(targetUid).get();
      if (!userDoc.exists) { setLoading(false); return; }
      setProfileUser({ id: userDoc.id, ...userDoc.data() });
      unsubItems = db.collection('items')
        .where('userId', '==', targetUid)
        .where('isPublic', '==', true)
        .orderBy('timestamp', 'desc')
        .onSnapshot(async (snap) => {
          const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          setProfileItems(items);
          await loadComments(items);
          setLoading(false);
        });
    })();
    return () => unsubItems && unsubItems();
  }, [targetUid]);

  // Categories shown in the filter = effective ones PLUS any categories that
  // appear in this user's items (so old custom categories still filter)
  const profileCategoryList = useMemo(() => {
    const fromItems = [...new Set(profileItems.map(i => i.category).filter(Boolean))];
    const merged = [...new Set([...effectiveCategories, ...fromItems])];
    return merged;
  }, [profileItems, effectiveCategories]);

  const filtered = useMemo(() => {
    let list = profileItems;
    if (selectedCategory !== 'All') list = list.filter(i => i.category === selectedCategory);
    list = list.filter(i => matchesTextFilter(i, textFilter));
    return list;
  }, [profileItems, selectedCategory, textFilter]);

  if (loading) return <div className="p-8 text-center">Loading profile…</div>;
  if (!profileUser) return <div className="p-8 text-center">User not found</div>;

  return (
    <div className="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 pb-6">
      <div className="max-w-2xl mx-auto px-4 py-6">
        <div className="flex items-center gap-4 mb-6">
          <button onClick={onBack} className="p-2 hover:bg-gray-100 rounded-lg" aria-label="Back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7" /></svg>
          </button>
          <div className="flex-1">
            <h2 className="text-2xl font-bold text-gray-800">{profileUser.displayName}</h2>
            <p className="text-sm text-gray-500">Public ratings</p>
          </div>
        </div>

        {profileItems.length > 0 && (
          <div className="bg-white rounded-2xl shadow-lg p-4 mb-6">
            <SearchBar
              value={textFilter}
              onChange={setTextFilter}
              placeholder={`Search ${profileUser.displayName}'s posts (2+ letters)...`}
            />
            <div className="flex items-center gap-2 mb-3">
              <Filter />
              <span className="font-semibold text-gray-700">Filter by category:</span>
            </div>
            <div className="flex flex-wrap gap-2">
              {['All', ...profileCategoryList].map(cat => (
                <button key={cat} onClick={() => setSelectedCategory(cat)}
                  className={`px-4 py-2 rounded-lg font-medium ${selectedCategory === cat ? 'bg-purple-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                  {cat}
                </button>
              ))}
            </div>
          </div>
        )}

        <div className="space-y-3">
          {filtered.length === 0 ? (
            <div className="bg-white rounded-2xl shadow-lg p-12 text-center">
              <p className="text-gray-500">
                {profileItems.length === 0
                  ? 'No public ratings yet.'
                  : textFilter && textFilter.trim().length >= 2
                    ? `No posts matching "${textFilter}".`
                    : 'No items in this category.'}
              </p>
            </div>
          ) : (
            filtered.map(item => (
              <ItemCard
                key={item.id}
                item={item}
                view="public"
                currentUser={currentUser}
                onVisitProfile={() => {}}
                comments={comments}
                setComments={setComments}
                userLat={userLat}
                userLng={userLng}
                effectiveCategories={effectiveCategories}
              />
            ))
          )}
        </div>
      </div>
    </div>
  );
}

// === ItemCard ===
function ItemCard({
  item, view, currentUser, onVisitProfile, onUpdate, onDelete,
  comments, setComments, userLat, userLng, effectiveCategories
}) {
  const [editingComment, setEditingComment] = useState(false);
  const [commentText, setCommentText] = useState(item.comment || '');
  const [showCategoryPicker, setShowCategoryPicker] = useState(false);
  const [editingReply, setEditingReply] = useState(false);
  const [replyText, setReplyText] = useState('');
  const isOwn = item.userId === currentUser.uid;

  // Build the picker list: standard list + any current category that's already on this item
  // (so custom categories from other devices still show up)
  const pickerCategories = useMemo(() => {
    const set = new Set(effectiveCategories || ALL_CATEGORIES);
    if (item.category) set.add(item.category);
    return Array.from(set);
  }, [effectiveCategories, item.category]);

  const toggleRating = async () => {
    const newRating = item.rating === 'like' ? 'dislike' : 'like';
    await db.collection('items').doc(item.id).update({ rating: newRating });
    onUpdate({ ...item, rating: newRating });
  };

  const togglePublic = async () => {
    const newPublic = !item.isPublic;
    await db.collection('items').doc(item.id).update({ isPublic: newPublic });
    onUpdate({ ...item, isPublic: newPublic });
  };

  const saveComment = async () => {
    if (commentText.trim() === (item.comment || '')) {
      setEditingComment(false);
      return;
    }
    await db.collection('items').doc(item.id).update({
      comment: commentText.trim() || null
    });
    onUpdate({ ...item, comment: commentText.trim() || null });
    setEditingComment(false);
  };

  const changeCategory = async (newCat) => {
    if (newCat === item.category) {
      setShowCategoryPicker(false);
      return;
    }
    await db.collection('items').doc(item.id).update({ category: newCat });
    onUpdate({ ...item, category: newCat });
    setShowCategoryPicker(false);

    // Remember this manual choice
    const normalized = normalizeForCache(item.text);
    categoryCache[normalized] = newCat;
    saveCache();
    console.log('💾 Cached manual categorization:', normalized, '→', newCat);
  };

  const handleDelete = async () => {
    await db.collection('items').doc(item.id).delete();
    onDelete(item.id);
  };

  const sendReply = async () => {
    const txt = replyText.trim();
    if (!txt || txt.length > 120) return;
    const payload = {
      itemId: item.id,
      text: txt,
      userId: currentUser.uid,
      userName: currentUser.displayName,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    try {
      const ref = await db.collection(COMMENTS_COLLECTION).add(payload);
      const newComment = { id: ref.id, ...payload, createdAt: new Date() };
      setComments(prev => ({
        ...prev,
        [item.id]: [...(prev?.[item.id] || []), newComment]
      }));
      setReplyText('');
      setEditingReply(false);
    } catch (error) {
      console.error('Failed to add comment:', error);
      alert('Failed to post comment. Check console.');
    }
  };

  return (
    <div className="bg-white rounded-xl shadow-md p-4 hover:shadow-lg transition-shadow">
      <div className="flex items-start justify-between">
        <div className="flex-1">
          <div className="flex items-center gap-2 mb-1 flex-wrap">
            {/* LIKE/DISLIKE */}
            <button
              onClick={isOwn ? toggleRating : undefined}
              className={`px-3 py-1 rounded-full text-sm font-semibold border-2 flex items-center gap-1.5 transition-colors
                ${item.rating === 'like'
                  ? 'bg-green-100 text-green-800 border-green-300 hover:bg-green-200'
                  : 'bg-red-100 text-red-800 border-red-300 hover:bg-red-200'
                } ${!isOwn ? 'cursor-default' : 'cursor-pointer'}`}
            >
              {item.rating === 'like' ? <ThumbsUp /> : <ThumbsDown />}
              <span>{item.rating === 'like' ? 'Liked' : 'Disliked'}</span>
            </button>

            {/* CATEGORY */}
            <div className="relative">
              <button
                onClick={() => isOwn && setShowCategoryPicker(!showCategoryPicker)}
                className="px-3 py-1 rounded-full text-xs font-medium bg-purple-100 text-purple-700 flex items-center gap-1 hover:bg-purple-200"
              >
                {item.category}
              </button>
              {isOwn && showCategoryPicker && (
                <div className="absolute top-full left-0 mt-1 w-44 bg-white rounded-lg shadow-xl border z-10 max-h-64 overflow-y-auto">
                  {pickerCategories.map(cat => (
                    <button
                      key={cat}
                      onClick={() => changeCategory(cat)}
                      className="block w-full text-left px-3 py-2 text-sm hover:bg-purple-50"
                    >
                      {cat}
                    </button>
                  ))}
                </div>
              )}
            </div>

            {/* PUBLIC/PRIVATE */}
            <button
              onClick={isOwn ? togglePublic : undefined}
              className={`px-3 py-1 rounded-full text-xs font-medium flex items-center gap-1 transition-colors
                ${item.isPublic
                  ? 'bg-blue-100 text-blue-700 hover:bg-blue-200'
                  : 'bg-gray-100 text-gray-600 hover:bg-gray-200'
                } ${!isOwn ? 'cursor-default' : 'cursor-pointer'}`}
            >
              {item.isPublic ? <Globe /> : <Lock />}
              <span>{item.isPublic ? 'Public' : 'Private'}</span>
            </button>

            {/* GEOTAG */}
            {item.geoLat && item.geoLng && (
              <a
                href={`https://www.google.com/maps/search/?api=1&query=${item.geoLat},${item.geoLng}`}
                target="_blank"
                rel="noopener noreferrer"
                className="px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-700 hover:bg-blue-200 flex items-center gap-1 transition-colors"
                title={`View "${item.text}" on map`}
                onClick={(e) => e.stopPropagation()}
              >
                📍{' '}
                {userLat && userLng
                  ? `${distanceKm(userLat, userLng, item.geoLat, item.geoLng).toFixed(1)}km`
                  : 'map'}
              </a>
            )}

            {/* USER (public feed) */}
            {view === 'public' && !isOwn && item.userName && (
              <button
                onClick={() => onVisitProfile?.(item.userId)}
                className="px-3 py-1 rounded-full text-xs font-medium bg-gray-100 text-gray-600 flex items-center gap-1 hover:bg-gray-200"
              >
                <Users />
                {item.userName}
              </button>
            )}
            {view === 'public' && isOwn && (
              <span className="px-3 py-1 rounded-full text-xs font-medium bg-purple-100 text-purple-700">
                You
              </span>
            )}
          </div>

          <p className="text-gray-800 font-medium mb-1">{item.text}</p>
          <p className="text-sm text-gray-500">{item.date}</p>

          {/* PRIVATE COMMENT */}
          {item.comment && !editingComment ? (
            <div className="mt-2 p-3 bg-gray-50 rounded-lg flex items-start justify-between">
              <p className="text-sm text-gray-700 italic flex-1">{item.comment}</p>
              {isOwn && (
                <button
                  onClick={() => setEditingComment(true)}
                  className="ml-2 text-xs text-purple-600 hover:underline"
                >
                  Edit
                </button>
              )}
            </div>
          ) : editingComment ? (
            <div className="mt-2 flex gap-1 items-center">
              <input
                type="text"
                value={commentText}
                onChange={e => setCommentText(e.target.value)}
                placeholder="Add a comment..."
                className="flex-1 px-3 py-1.5 text-sm border rounded-lg focus:outline-none focus:border-purple-400"
                autoFocus
              />
              <button onClick={saveComment} className="text-green-600 text-xs font-medium">Save</button>
              <button
                onClick={() => {
                  setEditingComment(false);
                  setCommentText(item.comment || '');
                }}
                className="text-red-600 text-xs"
              >
                Cancel
              </button>
            </div>
          ) : isOwn && !item.isPublic && (
            <button
              onClick={() => setEditingComment(true)}
              className="mt-2 text-xs text-purple-600 hover:underline"
            >
              Add comment
            </button>
          )}
        </div>

        {/* DELETE */}
        {isOwn && (
          <button
            onClick={handleDelete}
            className="ml-3 p-2 text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"
            aria-label="Delete item"
          >
            <Trash2 />
          </button>
        )}
      </div>

      {/* PUBLIC COMMENTS SECTION */}
      {item.isPublic && (
        <div className="mt-4 border-t pt-3">
          <div className="space-y-2 mb-3">
            {(comments?.[item.id] || []).map(c => {
              const isOwnComment = c.userId === currentUser.uid;
              const handleDeleteComment = async () => {
                try {
                  await db.collection(COMMENTS_COLLECTION).doc(c.id).delete();
                  setComments(prev => ({
                    ...prev,
                    [item.id]: prev[item.id]?.filter(cm => cm.id !== c.id) || []
                  }));
                } catch (error) {
                  console.error('Delete failed:', error);
                  alert('Delete failed - try again?');
                }
              };
              return (
                <div key={c.id} className="flex items-start gap-2 text-sm relative group">
                  <div className="font-medium text-purple-700">{c.userName}:</div>
                  <div className="text-gray-700 flex-1">{c.text}</div>
                  <div className="text-xs text-gray-400 ml-auto">
                    {c.createdAt ? new Date(c.createdAt.toDate?.() || c.createdAt).toLocaleString() : 'Just now'}
                  </div>
                  {isOwnComment && (
                    <button
                      onClick={handleDeleteComment}
                      className="absolute -top-1 -right-1 p-1 text-gray-300 hover:text-red-600 rounded-full hover:bg-red-50 opacity-0 group-hover:opacity-100 transition-opacity ml-2"
                      title="Delete comment"
                    >
                      <Trash2 width={12} height={12} />
                    </button>
                  )}
                </div>
              );
            })}
            {(!comments?.[item.id] || comments[item.id]?.length === 0) && (
              <p className="text-xs text-gray-500 italic">No comments yet</p>
            )}
          </div>

          {editingReply ? (
            <div className="flex gap-1.5 items-center mt-2">
              <input
                type="text"
                value={replyText}
                onChange={e => setReplyText(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && sendReply()}
                placeholder="Reply..."
                className="flex-1 px-2 py-1 text-sm border rounded-md focus:outline-none focus:border-purple-400"
                autoFocus
              />
              <button
                onClick={sendReply}
                className="text-xs font-medium text-purple-600 hover:underline"
              >
                Send
              </button>
              <button
                onClick={() => {
                  setEditingReply(false);
                  setReplyText('');
                }}
                className="text-xs text-gray-500"
              >
                Cancel
              </button>
            </div>
          ) : (
            <button
              onClick={() => setEditingReply(true)}
              className="text-xs text-purple-600 hover:underline mt-1"
            >
              Add comment
            </button>
          )}
        </div>
      )}
    </div>
  );
}

  const [isProcessing, setIsProcessing] = useState(false);
  const [isLoading, setIsLoading] = useState(true);
  const [showUserSearch, setShowUserSearch] = useState(false);
  const [searchQuery, setSearchQuery] = useState(''); // for user search modal
  const [searchResults, setSearchResults] = useState([]);

  const [hasMore, setHasMore] = useState(true);
  const [lastDoc, setLastDoc] = useState(null);
  const [loadingMore, setLoadingMore] = useState(false);

  const [touchStart, setTouchStart] = useState(null);
  const [touchEnd, setTouchEnd] = useState(null);
  const minSwipeDistance = 80;

  // Pull-to-refresh
  const [pullStartY, setPullStartY] = useState(null);
  const [pullDelta, setPullDelta] = useState(0);
  const [refreshing, setRefreshing] = useState(false);
  const PULL_THRESHOLD = 70;

  // Undo toast for instant adds (used by the Apple Shortcut deep-link too)
  const [undoToast, setUndoToast] = useState(null); // { id, text, rating, category }

  const [message, setMessage] = useState(null);
  const [comments, setComments] = useState({});

  // NEW: pending new-category modal
  const [newCatModal, setNewCatModal] = useState(null);
  // shape: { suggested, originalText, rating, geoLat, geoLng }

  // Demo mode
  const urlParams = new URLSearchParams(window.location.search);
  const demoUid = urlParams.get('demo');
  const demoCategory = urlParams.get('category') || 'Books';
  const [isDemoMode, setIsDemoMode] = useState(!!demoUid);
  const [demoUser, setDemoUser] = useState(null);

  // The set of categories that exists for THIS user (default + their own)
  const effectiveCategories = useMemo(() => {
    return [...new Set([...ALL_CATEGORIES, ...customCategories])];
  }, [customCategories]);

  // Categories shown as filter buttons in My/Feed: include any cats from visible items
  const visibleCategoryList = useMemo(() => {
    const fromItems = [
      ...new Set([
        ...items.map(i => i.category),
        ...publicItems.map(i => i.category)
      ].filter(Boolean))
    ];
    return [...new Set([...effectiveCategories, ...fromItems])];
  }, [items, publicItems, effectiveCategories]);

  const onTouchStart = (e) => {
    setTouchEnd(null);
    setTouchStart(e.targetTouches[0].clientX);
    // Only arm pull-to-refresh if we're at the very top of the page.
    setPullStartY(window.scrollY <= 0 ? e.targetTouches[0].clientY : null);
    setPullDelta(0);
  };
  const onTouchMove = (e) => {
    setTouchEnd(e.targetTouches[0].clientX);
    if (pullStartY !== null && window.scrollY <= 0) {
      const dy = e.targetTouches[0].clientY - pullStartY;
      // Only react to downward pulls; cap with resistance for a natural feel.
      setPullDelta(dy > 0 ? Math.min(dy * 0.5, 90) : 0);
    }
  };
  const onTouchEnd = () => {
    // Pull-to-refresh wins if it was a clear vertical pull from the top.
    if (pullDelta >= PULL_THRESHOLD) {
      refresh();
    } else if (touchStart !== null && touchEnd !== null) {
      const distance = touchStart - touchEnd;
      // Ignore horizontal swipe if the gesture was mostly vertical.
      if (Math.abs(distance) > minSwipeDistance && pullDelta < 20) {
        if (distance > 0 && view === 'my') setView('public');
        if (distance < 0 && view === 'public') setView('my');
      }
    }
    setTouchStart(null);
    setTouchEnd(null);
    setPullStartY(null);
    setPullDelta(0);
  };

  // === Pull-to-refresh: reload the current view's items ===
  const refresh = async () => {
    if (refreshing || !user) return;
    setRefreshing(true);
    try {
      if (view === 'public') {
        setHasMore(true);
        setLastDoc(null);
        setPublicItems([]);
        await loadPublicFeed(null, selectedCategory);
      } else {
        await loadMyItems(user.uid);
      }
      showMessage('Refreshed');
    } catch (e) {
      console.error('Refresh failed:', e);
      showMessage('Refresh failed', 'error');
    } finally {
      setRefreshing(false);
    }
  };

  const showMessage = (txt, type = 'success') => {
    setMessage({ txt, type });
    setTimeout(() => setMessage(null), 3000);
  };

  // === Undo toast for instant/voice adds ===
  const showUndo = (id, text, rating, category) => {
    if (!id) { showMessage('Added!'); return; }
    setUndoToast({ id, text, rating, category });
    setTimeout(() => {
      setUndoToast(prev => (prev && prev.id === id ? null : prev));
    }, 6000);
  };

  const undoAdd = async () => {
    if (!undoToast) return;
    const { id } = undoToast;
    setUndoToast(null);
    try {
      await db.collection('items').doc(id).delete();
      setItems(prev => prev.filter(i => i.id !== id));
      showMessage('Removed');
    } catch (e) {
      console.error('Undo failed:', e);
      showMessage('Undo failed', 'error');
    }
  };

  const loadComments = async (itemList) => {
    const itemIds = itemList.map(i => i.id);
    if (!itemIds.length) return;
    for (let i = 0; i < itemIds.length; i += 30) {
      const batch = itemIds.slice(i, i + 30);
      const snap = await db.collection(COMMENTS_COLLECTION)
        .where('itemId', 'in', batch)
        .orderBy('createdAt', 'asc')
        .get();
      const map = {};
      snap.docs.forEach(d => {
        const c = { id: d.id, ...d.data() };
        const arr = map[c.itemId] || [];
        arr.push(c);
        map[c.itemId] = arr;
      });
      setComments(prev => ({ ...prev, ...map }));
    }
  };

  const signOut = async () => {
    try {
      await auth.signOut();
      setItems([]);
      setPublicItems([]);
      setFollowing([]);
      setCustomCategories([]);
      setView('my');
      setTextFilter('');
      showMessage('Signed out');
    } catch (error) {
      console.error('Sign out error:', error);
    }
  };

  const saveUserToFirestore = async (user) => {
    await db.collection('users').doc(user.uid).set({
      displayName: user.displayName,
      email: user.email,
      photoURL: user.photoURL,
      lastLogin: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  };

  function fixBase64(str) {
    if (!str) return str;
    str = str.replace(/-/g, '+').replace(/_/g, '/');
    switch (str.length % 4) {
      case 2: str += '=='; break;
      case 3: str += '='; break;
    }
    return str;
  }

  const signInWithGoogle = async () => {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });

      if (isIOS && isInStandaloneMode()) {
        const popup = window.open(
          `${AUTH_WORKER_URL}/auth/google`,
          'googleAuth',
          'width=500,height=600,left=100,top=100'
        );

        return new Promise((resolve, reject) => {
          const handler = async (e) => {
            if (e.origin !== AUTH_WORKER_URL) return;
            if (e.data.type !== 'FIREBASE_AUTH') return;
            window.removeEventListener('message', handler);
            try {
              const rawToken = e.data.token;
              const token = fixBase64(rawToken);
              console.log('Token length:', token.length);
              const credential = firebase.auth.GoogleAuthProvider.credential(token);
              const result = await auth.signInWithCredential(credential);
              await saveUserToFirestore(result.user);
              showMessage('Signed in!');
              resolve(result);
            } catch (err) {
              console.error('Auth failed:', err);
              showMessage('Login failed: ' + err.message, 'error');
              reject(err);
            }
          };
          window.addEventListener('message', handler);
        });
      }

      const result = await auth.signInWithPopup(provider);
      await saveUserToFirestore(result.user);
      showMessage('Signed in!');
      return result;

    } catch (error) {
      console.error('Sign-in error:', error);
      showMessage('Sign-in failed', 'error');
    }
  };

  // === NEW: load user's custom categories ===
  const loadCustomCategories = async (uid) => {
    try {
      const snap = await db.collection('users').doc(uid).get();
      const data = snap.data() || {};
      const raw = Array.isArray(data.customCategories) ? data.customCategories : [];
      // Defensive: only keep non-empty strings
      const cats = raw.filter(c => typeof c === 'string' && c.trim().length > 0);
      setCustomCategories(cats);
      console.log('🏷️ Loaded custom categories:', cats);
    } catch (err) {
      console.error('Failed to load custom categories:', err);
    }
  };

  // === NEW: save a brand-new custom category ===
  const saveCustomCategory = async (name) => {
    const clean = name.trim();
    if (!clean) return;
    if (effectiveCategories.includes(clean)) return; // already exists
    const updated = [...customCategories, clean];
    setCustomCategories(updated);
    try {
      await db.collection('users').doc(user.uid).set({
        customCategories: updated
      }, { merge: true });
      console.log('🏷️ Saved new category:', clean);
    } catch (err) {
      console.error('Failed to save custom category:', err);
    }
  };

  // Auth observer
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async (u) => {
      console.log('Auth state changed:', u?.uid || 'logged out');
      setUser(u);
      if (u) {
        window.demoAbortController?.abort();
        setIsDemoMode(false);
        setPublicItems([]);
        setDemoUser(null);
        await Promise.all([
          loadMyItems(u.uid),
          loadFollowing(u.uid),
          loadCustomCategories(u.uid) // NEW
        ]);
      }
      setIsLoading(false);
    });
    return () => unsub();
  }, []);

  // Public feed reload
  useEffect(() => {
    if (view === 'public' && user) {
      setHasMore(true);
      setLastDoc(null);
      setPublicItems([]);
      loadPublicFeed(null, selectedCategory);
    }
  }, [view, following, user, selectedCategory]);

  // User search (debounced)
  useEffect(() => {
    const timeout = setTimeout(() => {
      searchUsers(searchQuery);
    }, 300);
    return () => clearTimeout(timeout);
  }, [searchQuery, following, user]);

  // Infinite scroll
  useEffect(() => {
    if (view !== 'public' || !hasMore || publicItems.length === 0 || loadingMore || isDemoMode || !user) return;
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          loadPublicFeed(lastDoc, selectedCategory);
        }
      },
      { threshold: 0.1 }
    );
    const lastItemEl = document.querySelector('.space-y-3 > *:last-child');
    if (lastItemEl) observer.observe(lastItemEl);
    return () => observer.disconnect();
  }, [publicItems, lastDoc, hasMore, loadingMore, view, user, isDemoMode, selectedCategory]);

  // Get location once
  useEffect(() => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => {
          setUserLat(pos.coords.latitude);
          setUserLng(pos.coords.longitude);
        },
        err => console.warn('Location unavailable:', err),
        { maximumAge: 300000 }
      );
    }
  }, []);

  // Auto-load demo
  useEffect(() => {
    if (demoUid && !user) {
      loadDemoProfile(demoUid, demoCategory);
      setView('public');
      setSelectedCategory(demoCategory);
    }
  }, [demoUid, demoCategory, user]);

  // Cancel demo on login
  useEffect(() => {
    if (user && isDemoMode) {
      window.demoAbortController?.abort();
      setIsDemoMode(false);
    }
  }, [user, isDemoMode]);

  // Clear text filter on view change so it doesn't carry over
  useEffect(() => {
    setTextFilter('');
  }, [view]);

  // === Apple Shortcut / deep-link entry ===
  // A Shortcut dictates text and opens e.g.
  //   https://binaryapp.app/?add=I%20like%20Dublin%20Pizza%20Company
  //   https://binaryapp.app/?add=Dublin%20Pizza%20Company&rating=like
  // We parse the sentiment, fire the entry instantly, then strip the param so a
  // refresh can't double-add. We give GPS a brief window so venues still geotag.
  const deepLinkFiredRef = React.useRef(false);
  useEffect(() => {
    if (!user || deepLinkFiredRef.current) return;
    const params = new URLSearchParams(window.location.search);
    const addText = params.get('add');
    if (!addText || !addText.trim()) return;

    const fire = () => {
      if (deepLinkFiredRef.current) return;
      deepLinkFiredRef.current = true;
      const ratingParam = (params.get('rating') || '').toLowerCase();
      let rating, text;
      if (ratingParam === 'like' || ratingParam === 'dislike') {
        rating = ratingParam;
        text = addText.trim();
      } else {
        ({ rating, text } = parseVoice(addText));
      }
      // Strip the query so refresh / re-open doesn't re-add.
      window.history.replaceState({}, '', window.location.pathname);
      if (text) {
        setView('my');
        addItem(rating, text);
      }
    };

    // Fire as soon as location is known; otherwise wait up to 2.5s then fire anyway.
    if (userLat !== null && userLng !== null) {
      fire();
    } else {
      const t = setTimeout(fire, 2500);
      return () => clearTimeout(t);
    }
  }, [user, userLat, userLng]);

  const loadPublicFeed = async (startAfterDoc = null, category = 'All') => {
    if (loadingMore && startAfterDoc) return;
    if (!user) {
      setLoadingMore(false);
      return;
    }
    setLoadingMore(true);
    const uids = [user.uid, ...following];
    if (!uids.length) {
      setPublicItems([]);
      setLoadingMore(false);
      setHasMore(false);
      return;
    }

    let allNewItems = [];
    let snap;

    for (let i = 0; i < uids.length; i += 10) {
      const batch = uids.slice(i, i + 10);
      let query = db.collection('items')
        .where('userId', 'in', batch)
        .where('isPublic', '==', true)
        .orderBy('timestamp', 'desc')
        .limit(20);

      if (category !== 'All') {
        query = query.where('category', '==', category);
      }
      if (startAfterDoc) {
        query = query.startAfter(startAfterDoc);
      }

      snap = await query.get();

      if (snap.empty && startAfterDoc) {
        setHasMore(false);
        break;
      }

      const items = await Promise.all(
        snap.docs.map(async doc => {
          const data = doc.data();
          const uDoc = await db.collection('users').doc(data.userId).get();
          const u = uDoc.data() || {};
          return {
            id: doc.id,
            ...data,
            userName: u.displayName || 'Anonymous',
            isOwnItem: data.userId === user.uid
          };
        })
      );
      allNewItems.push(...items);
    }

    allNewItems.sort((a, b) => b.timestamp - a.timestamp);
    // Dedupe by id — multi-batch "in" queries (>10 follows) can overlap.
    setPublicItems(prev => {
      const merged = startAfterDoc ? [...prev, ...allNewItems] : allNewItems;
      const seen = new Set();
      return merged.filter(i => (seen.has(i.id) ? false : (seen.add(i.id), true)));
    });

    if (allNewItems.length > 0 && snap?.docs?.length > 0) {
      setLastDoc(snap.docs[snap.docs.length - 1]);
      if (snap.docs.length < 20) {
        setHasMore(false);
      }
    } else {
      setHasMore(false);
    }

    await loadComments(startAfterDoc ? [...publicItems, ...allNewItems] : allNewItems);
    setLoadingMore(false);
  };

  const loadMyItems = async uid => {
    const snap = await db.collection('items').where('userId', '==', uid).orderBy('timestamp', 'desc').get();
    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    setItems(list);
    loadComments(list);
  };

  const loadFollowing = async uid => {
    const snap = await db.collection('follows').where('followerId', '==', uid).get();
    setFollowing(snap.docs.map(d => d.data().followingId));
  };

  const loadDemoProfile = async (uid, category) => {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 10000);
    try {
      const userDoc = await db.collection('users').doc(uid).get();
      if (!userDoc.exists || controller.signal.aborted) return;
      setDemoUser({ id: uid, ...userDoc.data() });
      const snap = await db.collection('items')
        .where('userId', '==', uid)
        .where('isPublic', '==', true)
        .where('category', '==', category)
        .orderBy('timestamp', 'desc')
        .get();
      if (controller.signal.aborted) return;
      const items = snap.docs.map(d => ({
        id: d.id,
        ...d.data(),
        userName: userDoc.data().displayName
      }));
      setPublicItems(items);
    } catch (err) {
      if (err.name === 'AbortError') return;
      console.error('Demo load error:', err);
    } finally {
      clearTimeout(timeout);
    }
    window.demoAbortController = controller;
  };

  const searchUsers = async q => {
    if (!q.trim()) {
      setSearchResults([]);
      return;
    }
    const lower = q.toLowerCase();
    const snap = await db.collection('users').get();
    const all = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .filter(u => u.id !== user?.uid)
      .filter(u =>
        u.displayName?.toLowerCase().includes(lower) ||
        u.email?.toLowerCase().includes(lower)
      );
    const followed = all.filter(u => following.includes(u.id));
    const others = all.filter(u => !following.includes(u.id));
    setSearchResults([...followed, ...others]);
  };

  const followUser = async targetId => {
    if (following.includes(targetId)) return showMessage('Already following');
    await db.collection('follows').doc(`${user.uid}_follows_${targetId}`).set({
      followerId: user.uid,
      followingId: targetId,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setFollowing([...following, targetId]);
    showMessage('Now following');
  };

  const unfollowUser = async targetId => {
    await db.collection('follows').doc(`${user.uid}_follows_${targetId}`).delete();
    setFollowing(following.filter(id => id !== targetId));
    showMessage('Unfollowed');
    if (view === 'public') loadPublicFeed(null);
  };

  // === ADD ITEM — the core flow, now handling NEW: suggestions ===
  // `overrideText` lets voice input submit a phrase without touching the box.
  const addItem = async (rating, overrideText) => {
    const originalText = (typeof overrideText === 'string' ? overrideText : inputText).trim();
    if (!originalText || isProcessing) return;
    setIsProcessing(true);

    try {
      // NOTE: uses the userLat/userLng already in state — no duplicate fetch.
      const result = await detectCategory(originalText, userLat, userLng, effectiveCategories);

      let cat;
      let geoLat = null;
      let geoLng = null;

      if (typeof result === 'object' && result !== null) {
        cat = result.category;
        geoLat = result.lat;
        geoLng = result.lng;
      } else {
        cat = result;
      }

      // NEW-CATEGORY FLOW: AI suggested a brand-new category
      if (typeof cat === 'string' && cat.startsWith('NEW:')) {
        const suggested = cat.slice(4).trim();
        setNewCatModal({
          suggested,
          originalText,
          rating,
          geoLat,
          geoLng
        });
        setIsProcessing(false);
        return;
      }

      // Normal save — show an "undo" toast so an instant/voice entry is reversible
      const savedId = await saveItem(originalText, rating, cat, geoLat, geoLng);
      showUndo(savedId, originalText, rating, cat);
    } catch (e) {
      console.error('addItem error:', e);
      showMessage('Error adding item', 'error');
    } finally {
      setIsProcessing(false);
    }
  };

  // === Shared save (used by addItem and the new-category modal callbacks) ===
  // Returns the new document id. Does NOT show a toast — caller decides.
  const saveItem = async (text, rating, category, geoLat = null, geoLng = null) => {
    const payload = {
      text,
      rating,
      category,
      timestamp: Date.now(),
      date: new Date().toLocaleDateString(),
      userId: user.uid,
      isPublic: true,
      geoLat,
      geoLng
    };
    const ref = await db.collection('items').add({
      ...payload,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    setItems(prev => [{ id: ref.id, ...payload }, ...prev]);
    setInputText('');

    // Cache the CATEGORY only (location is always resolved fresh from GPS).
    const normalized = normalizeForCache(text);
    categoryCache[normalized] = category;
    saveCache();

    return ref.id;
  };

  // Modal callbacks
  const handleNewCatAdd = async (finalName) => {
    if (!newCatModal) return;
    const { originalText, rating, geoLat, geoLng } = newCatModal;
    await saveCustomCategory(finalName);
    const savedId = await saveItem(originalText, rating, finalName, geoLat, geoLng);
    setNewCatModal(null);
    showUndo(savedId, originalText, rating, finalName);
  };

  const handleNewCatUseOther = async () => {
    if (!newCatModal) return;
    const { originalText, rating, geoLat, geoLng } = newCatModal;
    const savedId = await saveItem(originalText, rating, 'Other', geoLat, geoLng);
    setNewCatModal(null);
    showUndo(savedId, originalText, rating, 'Other');
  };

  const handleNewCatCancel = () => {
    setNewCatModal(null);
    setIsProcessing(false);
  };

  const deleteItem = async id => {
    await db.collection('items').doc(id).delete();
    setItems(prev => prev.filter(i => i.id !== id));
    showMessage('Deleted');
  };

  const togglePublic = async (id, cur) => {
    await db.collection('items').doc(id).update({ isPublic: !cur });
    setItems(prev => prev.map(i => i.id === id ? { ...i, isPublic: !cur } : i));
    showMessage(cur ? 'Now private' : 'Now public');
  };

  const visitProfile = uid => {
    if (!following.includes(uid)) {
      showMessage('Follow this user first to view their page', 'error');
      return;
    }
    setView('profile');
    setProfileTarget(uid);
  };

  const backFromProfile = () => {
    setView('public');
    setProfileTarget(null);
  };

  const currentItems = view === 'my' ? items : view === 'public' ? publicItems : [];

  const filteredItems = useMemo(() => {
    let list = currentItems;
    if (selectedCategory !== 'All') list = list.filter(i => i.category === selectedCategory);
    list = list.filter(i => matchesTextFilter(i, textFilter));
    return list;
  }, [currentItems, selectedCategory, textFilter]);

  // === DEMO MODE (no login) ===
  if (isDemoMode && !user) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 pb-6">
        <div className="max-w-2xl mx-auto px-4 py-6">
          <div className="bg-purple-100 border-l-4 border-purple-500 p-4 mb-6 rounded-r-lg">
            <p className="text-purple-800 font-semibold">Demo: {demoUser?.displayName || "Yvonne's"} Book Ratings</p>
            <p className="text-sm text-purple-700 mt-1">Public view — <a href="https://yvonnebuttle.github.io/binary/" className="underline">Try the full app</a></p>
          </div>

          <div className="text-center mb-6">
            <h1 className="text-3xl font-bold text-gray-800">Binary Books</h1>
            <p className="text-gray-600">What I've liked/disliked</p>
          </div>

          <div className="bg-white rounded-2xl shadow-lg p-4 mb-6">
            <span className="font-semibold text-gray-700">Category: Books</span>
          </div>

          <div className="space-y-3">
            {publicItems.length === 0 ? (
              <div className="bg-white rounded-2xl shadow-lg p-12 text-center">
                <p className="text-gray-500">Loading books...</p>
              </div>
            ) : (
              publicItems.map(itm => (
                <div key={itm.id} className="bg-white rounded-xl shadow-md p-4">
                  <div className="flex items-center gap-2 mb-2">
                    <span className={`px-3 py-1 rounded-full text-sm font-semibold ${itm.rating === 'like' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                      {itm.rating === 'like' ? <ThumbsUp /> : <ThumbsDown />} {itm.rating}
                    </span>
                    <span className="text-xs bg-purple-100 text-purple-700 px-2 py-1 rounded-full">Books</span>
                    <span className="text-sm text-gray-600 ml-auto">{itm.date}</span>
                  </div>
                  <p className="text-gray-800 font-medium">{itm.text}</p>
                  {itm.comment && <p className="text-sm text-gray-500 italic mt-1">"{itm.comment}"</p>}
                </div>
              ))
            )}
          </div>
        </div>
      </div>
    );
  }

  // === LOGIN SCREEN ===
  if (!user && !isDemoMode) {
    return (
      <div className="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 flex items-center justify-center px-4">
        <div className="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full text-center">
          <h1 className="text-4xl font-bold text-gray-800 mb-2">Binary</h1>
          <p className="text-gray-600 mb-8">Yes/no, that's all</p>
          <button
            onClick={signInWithGoogle}
            className="w-full bg-white border-2 border-gray-300 hover:border-gray-400 text-gray-700 font-semibold py-3 px-6 rounded-xl flex items-center justify-center gap-3 transition-all hover:shadow-md"
          >
            <svg className="w-5 h-5" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Sign in with Google
          </button>
          {isIOS && (
            <p className="text-xs text-gray-500 mt-4">
              iOS users: If sign-in doesn't work, try allowing popups in Safari settings.
            </p>
          )}
          <div className="mt-6 pt-6 border-t border-gray-200">
            <a href="https://yvonnebuttle.github.io/binary/privacy.html" target="_blank" rel="noopener noreferrer" className="text-sm text-gray-500 hover:text-purple-600">
              Privacy Policy
            </a>
          </div>
        </div>
      </div>
    );
  }

  if (isLoading) return <div className="min-h-screen flex items-center justify-center">Loading…</div>;

  if (view === 'profile' && profileTarget) {
    return <UserProfile
      key={profileTarget}
      targetUid={profileTarget}
      onBack={backFromProfile}
      currentUser={user}
      userLat={userLat}
      userLng={userLng}
      effectiveCategories={effectiveCategories}
    />;
  }

  return (
    <div className="min-h-screen bg-gradient-to-br from-purple-50 to-blue-50 pb-6">
      {/* Pull-to-refresh indicator */}
      {(pullDelta > 0 || refreshing) && (
        <div
          className="fixed top-0 left-0 right-0 z-40 flex items-center justify-center pointer-events-none"
          style={{ height: refreshing ? 48 : Math.max(pullDelta, 0), opacity: refreshing ? 1 : Math.min(pullDelta / PULL_THRESHOLD, 1) }}
        >
          <div className="flex items-center gap-2 text-purple-600 text-sm font-medium">
            <span className={refreshing ? 'animate-spin' : ''} style={{ transform: refreshing ? 'none' : `rotate(${pullDelta * 3}deg)` }}>
              <RefreshCw />
            </span>
            <span>{refreshing ? 'Refreshing…' : pullDelta >= PULL_THRESHOLD ? 'Release to refresh' : 'Pull to refresh'}</span>
          </div>
        </div>
      )}
      <div
        className="max-w-2xl mx-auto px-4 py-6"
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        style={{ transform: pullDelta > 0 ? `translateY(${pullDelta}px)` : 'none', transition: pullDelta > 0 ? 'none' : 'transform 0.2s' }}
      >
        {message && (
          <div className={`fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-lg text-white font-medium ${message.type === 'error' ? 'bg-red-500' : 'bg-green-500'}`}>
            {message.txt}
          </div>
        )}

        {/* UNDO TOAST (instant/voice adds) */}
        {undoToast && (
          <div className="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 bg-gray-900 text-white px-4 py-3 rounded-xl shadow-2xl max-w-[90vw]">
            <span className="text-sm">
              {undoToast.rating === 'like' ? '👍' : '👎'} Added{' '}
              <span className="font-semibold">"{undoToast.text.length > 28 ? undoToast.text.slice(0, 28) + '…' : undoToast.text}"</span>
              <span className="text-gray-400"> · {undoToast.category}</span>
            </span>
            <button
              onClick={undoAdd}
              className="text-purple-300 hover:text-purple-100 font-semibold text-sm underline shrink-0"
            >
              Undo
            </button>
          </div>
        )}

        {/* NEW-CATEGORY MODAL */}
        {newCatModal && (
          <NewCategoryModal
            suggested={newCatModal.suggested}
            originalText={newCatModal.originalText}
            onAdd={handleNewCatAdd}
            onUseOther={handleNewCatUseOther}
            onCancel={handleNewCatCancel}
          />
        )}

        {/* User Search Modal */}
        {showUserSearch && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
            <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full max-h-[80vh] overflow-hidden flex flex-col">
              <div className="p-6 border-b flex items-center justify-between">
                <h2 className="text-2xl font-bold text-gray-800">Find Users</h2>
                <button onClick={() => { setShowUserSearch(false); setSearchQuery(''); setSearchResults([]); }} className="p-2 hover:bg-gray-100 rounded-lg"><X /></button>
              </div>
              <div className="p-6">
                <div className="relative">
                  <div className="absolute left-3 top-3 text-gray-400"><Search /></div>
                  <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search by name…" className="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-400 focus:outline-none" autoFocus />
                </div>
              </div>
              <div className="flex-1 overflow-y-auto px-6 pb-6">
                {searchResults.length === 0 && searchQuery && <p className="text-center text-gray-500 py-8">No users found</p>}
                {searchResults.length === 0 && !searchQuery && <p className="text-center text-gray-500 py-8">Start typing…</p>}
                <div className="space-y-3">
                  {searchResults.map(u => (
                    <div key={u.id} className="bg-gray-50 rounded-xl p-4 flex items-center justify-between">
                      <div className="flex items-center gap-2">
                        {following.includes(u.id) ? (
                          <button
                            onClick={() => {
                              setShowUserSearch(false);
                              setView('profile');
                              setProfileTarget(u.id);
                            }}
                            className="font-semibold text-purple-700 hover:text-purple-900 hover:underline"
                          >
                            {u.displayName}
                          </button>
                        ) : (
                          <span className="font-semibold text-gray-800">{u.displayName}</span>
                        )}
                        {following.includes(u.id) && (
                          <span className="px-2 py-0.5 text-xs font-medium bg-purple-100 text-purple-700 rounded-full">
                            Following
                          </span>
                        )}
                      </div>
                      {following.includes(u.id) ? (
                        <button
                          onClick={() => unfollowUser(u.id)}
                          className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg font-medium flex items-center gap-2"
                        >
                          <UserMinus /> Unfollow
                        </button>
                      ) : (
                        <button
                          onClick={() => followUser(u.id)}
                          className="px-4 py-2 bg-purple-500 hover:bg-purple-600 text-white rounded-lg font-medium flex items-center gap-2"
                        >
                          <UserPlus /> Follow
                        </button>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Header */}
        <div className="text-center mb-6">
          <div className="flex items-center justify-between mb-2">
            <button onClick={() => setShowUserSearch(true)} className="p-2 text-purple-600 hover:bg-purple-50 rounded-lg" aria-label="Find users"><Search /></button>
            <h1 className="text-3xl font-bold text-gray-800">Binary</h1>
            <button onClick={signOut} className="p-2 text-gray-600 hover:text-red-500 hover:bg-red-50 rounded-lg" aria-label="Sign out"><LogOut /></button>
          </div>
          <p className="text-gray-600">Welcome, {user.displayName}!</p>
        </div>

        {/* View Toggle */}
        <div className="bg-white rounded-2xl shadow-lg p-4 mb-6">
          <div className="flex gap-2">
            <button onClick={() => setView('my')} className={`flex-1 py-3 px-4 rounded-xl font-semibold flex items-center justify-center gap-2 ${view === 'my' ? 'bg-purple-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
              <Lock /> My Items ({items.length})
            </button>
            <button onClick={() => setView('public')} className={`flex-1 py-3 px-4 rounded-xl font-semibold flex items-center justify-center gap-2 ${view === 'public' ? 'bg-purple-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
              <Globe /> Feed
            </button>
          </div>
        </div>

        {/* Input */}
        {view === 'my' && (
          <div className="bg-white rounded-2xl shadow-lg p-6 mb-6">
            <input
              type="text"
              value={inputText}
              onChange={e => {
                const val = e.target.value;
                if (val.length <= 500) setInputText(val);
              }}
              placeholder="What did you experience?"
              className="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-purple-400 focus:outline-none mb-4"
              disabled={isProcessing}
            />
            <div className="flex gap-3">
              <button
                onClick={() => addItem('like')}
                disabled={!inputText.trim() || isProcessing}
                className="flex-1 bg-green-500 hover:bg-green-600 disabled:bg-gray-300 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2"
              >
                <ThumbsUp />
                {isProcessing ? '…' : 'Like'}
              </button>
              <button
                onClick={() => addItem('dislike')}
                disabled={!inputText.trim() || isProcessing}
                className="flex-1 bg-red-500 hover:bg-red-600 disabled:bg-gray-300 text-white font-semibold py-3 rounded-xl flex items-center justify-center gap-2"
              >
                <ThumbsDown />
                {isProcessing ? '…' : 'Dislike'}
              </button>
            </div>
          </div>
        )}

        {/* Filter + Search */}
        {((view === 'my' && items.length > 0) || view === 'public') && (
          <div className="bg-white rounded-2xl shadow-lg p-4 mb-6">
            <SearchBar
              value={textFilter}
              onChange={setTextFilter}
              placeholder={view === 'my' ? 'Search your posts (2+ letters)...' : 'Search the feed (2+ letters)...'}
            />
            <div className="flex items-center gap-2 mb-3">
              <Filter />
              <span className="font-semibold text-gray-700">Filter by category:</span>
            </div>
            <div className="flex flex-wrap gap-2">
              {['All', ...visibleCategoryList].map(c => (
                <button
                  key={c}
                  onClick={() => setSelectedCategory(c)}
                  className={`px-4 py-2 rounded-lg font-medium ${selectedCategory === c ? 'bg-purple-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                  {c}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Items list */}
        <div className="space-y-3">
          {filteredItems.length === 0 ? (
            <div className="bg-white rounded-2xl shadow-lg p-12 text-center">
              <p className="text-gray-500">
                {textFilter && textFilter.trim().length >= 2
                  ? `No posts matching "${textFilter}".`
                  : view === 'public'
                    ? following.length === 0
                      ? 'Follow users to see their ratings!'
                      : 'No public items yet'
                    : items.length === 0
                      ? 'Start rating!'
                      : 'No items in this category'}
              </p>
              {view === 'public' && following.length === 0 && !textFilter && (
                <button
                  onClick={() => setShowUserSearch(true)}
                  className="mt-4 px-6 py-3 bg-purple-500 hover:bg-purple-600 text-white rounded-xl font-semibold flex items-center gap-2 mx-auto"
                >
                  <Search /> Find Users
                </button>
              )}
            </div>
          ) : (
            filteredItems.map(itm => {
              const handleUpdate = updatedItem => {
                if (view === 'my') {
                  setItems(prev => prev.map(i => (i.id === updatedItem.id ? updatedItem : i)));
                } else {
                  setPublicItems(prev => prev.map(i => (i.id === updatedItem.id ? updatedItem : i)));
                }
              };
              const handleDelete = id => {
                if (view === 'my') {
                  setItems(prev => prev.filter(i => i.id !== id));
                } else {
                  setPublicItems(prev => prev.filter(i => i.id !== id));
                }
              };
              return (
                <ItemCard
                  key={itm.id}
                  item={itm}
                  view={view}
                  currentUser={user}
                  userLat={userLat}
                  userLng={userLng}
                  onVisitProfile={visitProfile}
                  onUpdate={handleUpdate}
                  onDelete={handleDelete}
                  comments={comments}
                  setComments={setComments}
                  effectiveCategories={effectiveCategories}
                />
              );
            })
          )}
        </div>

        {/* Stats */}
        {view === 'my' && items.length > 0 && (
          <div className="mt-6 bg-white rounded-2xl shadow-lg p-6">
            <h3 className="font-bold text-gray-800 mb-3">Your Stats</h3>
            <div className="grid grid-cols-2 gap-4">
              <div className="text-center p-4 bg-green-50 rounded-xl">
                <div className="text-3xl font-bold text-green-600">{items.filter(i => i.rating === 'like').length}</div>
                <div className="text-sm text-gray-600">Liked</div>
              </div>
              <div className="text-center p-4 bg-red-50 rounded-xl">
                <div className="text-3xl font-bold text-red-600">{items.filter(i => i.rating === 'dislike').length}</div>
                <div className="text-sm text-gray-600">Disliked</div>
              </div>
            </div>
            {customCategories.length > 0 && (
              <div className="mt-4 pt-4 border-t border-gray-100">
                <p className="text-xs text-gray-500 mb-2">Your custom categories:</p>
                <div className="flex flex-wrap gap-1">
                  {customCategories.map(c => (
                    <span key={c} className="px-2 py-1 text-xs bg-purple-50 text-purple-700 rounded-md">{c}</span>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* Footer */}
        <div className="mt-8 text-center pb-4">
          <a href="https://yvonnebuttle.github.io/binary/privacy.html" target="_blank" rel="noopener noreferrer" className="text-sm text-gray-500 hover:text-purple-600">
            Privacy Policy
          </a>
          {' | '}
          <a
            href={`mailto:yvonnebuttle1@gmail.com?subject=Binary%20App%20Bug%20-%20${encodeURIComponent(navigator.userAgent.substring(0, 100))}&body=Hi!%20I%20found%20a%20bug%20on%20${new Date().toLocaleDateString()}.%0A%0ADescribe%20it%20here:%0A%0ASteps:%201.%20...%202.%20...%0A%0ADevice/Browser:%20${encodeURIComponent(navigator.userAgent.substring(0, 100))}`}
            className="text-sm text-gray-500 hover:text-purple-600"
          >
            Report Bug
          </a>
        </div>
      </div>
    </div>
  );
}

// Error Boundary
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error };
  }
  componentDidCatch(error, errorInfo) {
    console.error('App render error:', error, errorInfo);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div className="min-h-screen flex items-center justify-center bg-red-50">
          <div className="text-center p-8 bg-white rounded-lg shadow">
            <h2 className="text-red-600 mb-4">Oops! Something broke.</h2>
            <p className="text-gray-600 mb-4">Error: {this.state.error?.message || 'Unknown'}</p>
            <button onClick={() => window.location.reload()} className="bg-red-500 text-white px-4 py-2 rounded">Reload App</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

// Render
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ErrorBoundary>
    <BinaryApp />
  </ErrorBoundary>
);
console.log('App mounted!');
</script>
</body>
</html>
